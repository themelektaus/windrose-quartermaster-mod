[Settings]
; Wait 3 seconds before dump starts (gives engine time to settle if injected very early).
SleepTimeout=3

; Press F8 to trigger dump manually (alternative to SleepTimeout).
DumpKey=0x77

; Generate SDK into this absolute path. Keeps the dump out of C:/Dumper-7.
SDKGenerationPath=E:/Windrose/Mods/Quartermaster/Tools/Dumper7Setup/output

; Namespace for the generated C++ SDK.
SDKNamespaceName=R5SDK
