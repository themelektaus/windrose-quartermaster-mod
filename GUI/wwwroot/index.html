<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windrose Stack Size Configurator</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header>
    <h1>Windrose Stack Size Configurator</h1>
    <div id="profile-bar" class="profile-bar">
      <label class="profile-select-label">Profile
        <select id="profile-select"></select>
      </label>
      <button id="btn-new"        type="button">+ New</button>
      <button id="btn-duplicate"  type="button">Duplicate</button>
      <button id="btn-rename"     type="button">Rename</button>
      <button id="btn-save"       type="button" disabled>Save</button>
      <button id="btn-delete"     type="button">Delete</button>
      <button id="btn-build"      type="button" class="primary">Build .pak</button>
    </div>
    <div id="profile-meta" class="profile-meta"></div>
  </header>

  <main>
    <aside id="left-pane">
      <section class="card">
        <h2>Globals &mdash; Stack Size</h2>
        <fieldset id="stacksize-globals">
          <label class="radio-row">
            <input type="radio" name="ssmode" value="none" checked>
            None &mdash; per-item overrides only (or vanilla)
          </label>
          <label class="radio-row">
            <input type="radio" name="ssmode" value="multiplier">
            Multiplier &mdash; <code>vanilla &times; N</code>
          </label>
          <div class="indent">
            <label>Value <input type="number" id="ss-mult" min="1" step="1" value="4" disabled></label>
            <label>Cap (0 = none) <input type="number" id="ss-cap" min="0" step="1" value="0" disabled></label>
          </div>
          <label class="radio-row">
            <input type="radio" name="ssmode" value="absolute">
            Absolute &mdash; flat value for every item
          </label>
          <div class="indent">
            <label>Value <input type="number" id="ss-abs" min="0" step="1" value="999" disabled></label>
          </div>
        </fieldset>
      </section>

      <section class="card">
        <h2>Status</h2>
        <dl id="status-summary">
          <dt>Items in vanilla</dt><dd id="stat-total">&mdash;</dd>
          <dt>Per-item overrides</dt><dd id="stat-overrides">&mdash;</dd>
          <dt>Will be modified</dt><dd id="stat-modified">&mdash;</dd>
          <dt>Of which promoted</dt><dd id="stat-promoted">&mdash;</dd>
        </dl>
      </section>
    </aside>

    <section id="right-pane">
      <div class="item-controls">
        <input type="search" id="item-filter" placeholder="Filter items by id or name...">
        <select id="filter-class"><option value="">All classes</option></select>
        <select id="filter-rarity"><option value="">All rarities</option></select>
        <select id="filter-changed">
          <option value="all">Show all</option>
          <option value="changed">Only changed</option>
          <option value="unchanged">Only unchanged</option>
          <option value="overridden">Only overridden</option>
        </select>
        <span id="item-count" class="item-count"></span>
      </div>
      <ul id="item-list" class="item-list"></ul>
    </section>
  </main>

  <footer>
    <h2>Build Log</h2>
    <pre id="build-log">No build yet. Press <kbd>Build .pak</kbd> to run the pipeline.</pre>
    <p class="footer-links">Debug view: <a href="/items-test.html">items-test.html</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
